spring:
  profiles:
    active: dev
  application:
    name: discodeit
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate # 설정이 같은지만 체크
  servlet:
    multipart:
      maxFileSize: 10MB # 파일 하나의 최대 크기
      maxRequestSize: 30MB  # 한 번에 최대 업로드 가능 용량

logging:
  level:
    root: info
    
# repo 구현체 선택
discodeit:
  storage: # storage 저장 방식
    type: local # file
    local:
      root-path: .discodeit # 파일레포 저장 위치

